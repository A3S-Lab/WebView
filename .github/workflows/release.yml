name: Release
# One tag → macOS binaries + the `a3s-webview` Homebrew formula, so they never
# drift. The formula step needs HOMEBREW_TAP_TOKEN (write access to
# A3S-Lab/homebrew-tap); it skips cleanly if the secret is absent (binaries
# always build). Linux/Windows aren't shipped yet — they'd need WebKitGTK / the
# WebView2 runtime; the a3s TUI falls back to the browser there.
on:
  push:
    tags: ["v*"]
permissions:
  contents: write
jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 \
            || gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" \
                 --notes "a3s-webview ${GITHUB_REF_NAME}" --verify-tag

  binaries:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        target: [aarch64-apple-darwin, x86_64-apple-darwin]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: a3s-webview
          target: ${{ matrix.target }}
          archive: a3s-webview-$tag-$target
          token: ${{ secrets.GITHUB_TOKEN }}

  homebrew:
    needs: binaries
    runs-on: ubuntu-latest
    steps:
      - name: Update Homebrew tap formula
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${TAP_TOKEN:-}" ]; then
            echo "HOMEBREW_TAP_TOKEN not set — skipping Homebrew update"; exit 0
          fi
          tag="$GITHUB_REF_NAME"; v="${tag#v}"
          base="https://github.com/A3S-Lab/WebView/releases/download/${tag}"
          sha() { curl -fsSL "$base/a3s-webview-${tag}-$1.tar.gz" | sha256sum | cut -d' ' -f1; }
          mac_arm=$(sha aarch64-apple-darwin)
          mac_x86=$(sha x86_64-apple-darwin)
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/A3S-Lab/homebrew-tap.git" tap
          cat > tap/Formula/a3s-webview.rb <<RB
          class A3sWebview < Formula
            desc "Native WebView popup helper for the a3s code TUI (RemoteUI)"
            homepage "https://github.com/A3S-Lab/WebView"
            version "${v}"
            license "MIT"

            on_macos do
              on_arm do
                url "${base}/a3s-webview-${tag}-aarch64-apple-darwin.tar.gz"
                sha256 "${mac_arm}"
              end
              on_intel do
                url "${base}/a3s-webview-${tag}-x86_64-apple-darwin.tar.gz"
                sha256 "${mac_x86}"
              end
            end

            def install
              bin.install "a3s-webview"
            end

            test do
              assert_match "usage", shell_output("#{bin}/a3s-webview --help")
            end
          end
          RB
          cd tap
          git config user.email "ci@a3s.dev"
          git config user.name "A3S CI"
          git add Formula/a3s-webview.rb
          git diff --cached --quiet || git commit -m "a3s-webview ${v} (automated)"
          git push
